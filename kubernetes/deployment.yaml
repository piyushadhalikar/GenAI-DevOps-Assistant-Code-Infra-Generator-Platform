apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-devops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai
  template:
    metadata:
      labels:
        app: genai
    spec:
      containers:
      - name: genai
        image: genai-devops:latest
        ports:
        - containerPort: 8000