apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai-backend
  template:
    metadata:
      labels:
        app: genai-backend
    spec:
      containers:
      - name: backend
        image: genai-devops-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: GROQ_API_KEY
          value: "your_groq_api_key_here"